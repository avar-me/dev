<body>
    <!-- Фоновый паттерн (из index.avar.me) -->
    <div class="bg-pattern" aria-hidden="true"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <p class="header-tag">dev.avar.me</p>
            <h1 class="title" id="dictTitle">Аварско-русский<br><span class="dot">словарь</span></h1>
            <div class="dict-toggle">
                <button class="toggle-btn active" data-type="av-ru">Авар → Рус</button>
                <button class="toggle-btn" data-type="ru-av">Рус → Авар</button>
            </div>
            <p class="header-link"><a href="phrases.html">Поиск по фразам →</a></p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="Введите слово для поиска…"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                    >
                    <button id="clearBtn" class="clear-btn" aria-label="Очистить">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <!-- Suggestions Dropdown -->
                <div id="suggestions" class="suggestions"></div>
            </div>

            <!-- Search Stats -->
            <div id="searchStats" class="search-stats"></div>
        </div>

        <!-- Results Section -->
        <div id="results" class="results-section"></div>

        <!-- Home: random words with glosses (как на avar.me) -->
        <div id="randomWordsSection" class="home-samples-section">
            <div id="homeSamples"></div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Загрузка…</p>
        </div>

        <!-- Error Message -->
        <div id="error" class="error-message"></div>

        <!-- Footer -->
        <footer class="footer">

            </p>
            <p>
                Проект <a href="https://avar.me" target="_blank" rel="noopener">avar.me</a>

            <p>
                <a href="https://github.com/avar-me" target="_blank" rel="noopener">github.com/avar-me</a>
            </p>
        </footer>
