<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Поиск по фразам и примерам — аварско-русский и русско-аварский словарь, dev.avar.me">
    <meta name="keywords" content="аварский язык, русский язык, словарь, фразы, примеры, Дагестан">
    <meta name="author" content="dev.avar.me">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Поиск по фразам — dev.avar.me">
    <meta property="og:description" content="Полнотекстовый поиск по примерам аварско-русского и русско-аварского словаря">
    <meta property="og:url" content="https://dev.avar.me/phrases.html">

    <title>Поиск по фразам — dev.avar.me</title>

    <!-- Google Fonts (из index.avar.me) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css?v=__ASSET_VERSION__">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png">
</head>
<body>
    <!-- Фоновый паттерн (из index.avar.me) -->
    <div class="bg-pattern" aria-hidden="true"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <p class="header-tag"><a href="index.html">dev.avar.me</a></p>
            <h1 class="title">Поиск<br><span class="dot">по фразам</span></h1>
            <p class="phrases-subtitle">Ищет текст внутри примеров и переводов — не только заглавные слова</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <input
                        type="text"
                        id="phraseSearchInput"
                        class="search-input"
                        placeholder="Слово или часть фразы…"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                    >
                    <button id="phraseClearBtn" class="clear-btn" aria-label="Очистить">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="phraseStats" class="search-stats"></div>
        </div>

        <!-- Results -->
        <div id="phraseResults" class="phrase-results">
            <section class="phrase-section" id="sectionAvRu">
                <h2 class="phrase-section-title">Авар → Рус</h2>
                <div id="tableAvRu" class="phrase-table-wrap"></div>
            </section>
            <section class="phrase-section" id="sectionRuAv">
                <h2 class="phrase-section-title">Рус → Авар</h2>
                <div id="tableRuAv" class="phrase-table-wrap"></div>
            </section>
        </div>

        <!-- Loading Indicator -->
        <div id="phraseLoading" class="loading">
            <div class="spinner"></div>
            <p>Загрузка фраз…</p>
        </div>

        <!-- Error Message -->
        <div id="phraseError" class="error-message"></div>

        <!-- Footer -->
        <footer class="footer">
            <p>
                <a href="index.html">← Словарь</a>
            </p>
            <p>
                Проект <a href="https://avar.me" target="_blank" rel="noopener">avar.me</a>
                · <a href="mailto:admin@avar.me">admin@avar.me</a>
            </p>
            <p>
                <a href="https://github.com/avar-me" target="_blank" rel="noopener">github.com/avar-me</a>
            </p>
        </footer>
    </div>

    <script>window.__DICT_ASSET_V__ = "__ASSET_VERSION__";</script>
    <script src="phrases.js?v=__ASSET_VERSION__" charset="utf-8"></script>
</body>
</html>
